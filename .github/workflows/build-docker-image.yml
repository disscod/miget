Name: Build nodejs and Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      # 当根目录下的这些文件发生变动时，触发构建
      - 'index.js'
      - 'package.json'
      - 'Dockerfile'
  pull_request:
    branches:
      - main
    paths:
      - 'index.js'
      - 'package.json'
      - 'Dockerfile'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .           # 修改为点（.），代表当前根目录
          file: ./Dockerfile   # 修改为根目录下的 Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64

          tags: |
            ghcr.io/${{ github.repository_owner }}/miget:520

          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.description=Node.js Service
            org.opencontainers.image.licenses=MIT

          cache-from: type=gha
          cache-to: type=gha,mode=max
