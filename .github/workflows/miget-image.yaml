name: Build and Push Miget Custom Image

# 触发机制：当代码推送到 main 分支，或者在 GitHub 网页上手动点击运行 (workflow_dispatch)
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出你在 GitHub 上的代码仓库（包含 Dockerfile, entrypoint.sh, index.js 等）
    - name: Checkout Repository
      uses: actions/checkout@v4

    # 2. 设置 Docker Buildx（用于提升构建性能并支持多架构缓存）
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # 3. 登录到 Docker Hub
    # 请确保已在 GitHub 仓库的 Settings -> Secrets 中配置了 DOCKER_USERNAME 和 DOCKER_PASSWORD
    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 4. 构建镜像并直接推送到 Docker Hub
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        push: true
        # 这里的命名规则是：你的DockerHub用户名/镜像名:标签
        # 建议直接将 "latest" 作为标签，方便在 Miget 上拉取最新版
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/miget-node-service:latest
        # 启用缓存以加快后续的构建速度
        cache-from: type=gha
        cache-to: type=gha,mode=max
